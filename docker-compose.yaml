services:
  # ---------------- SOCK SHOP ----------------
  front-end:
    image: weaveworksdemos/front-end:0.3.12
    ports:
      - "8079:8079"
    depends_on:
      - catalogue
      - otel

  catalogue:
    image: weaveworksdemos/catalogue:0.3.5

  carts:
    image: weaveworksdemos/carts:0.4.8

  user:
    image: weaveworksdemos/user:0.4.7

  orders:
    image: weaveworksdemos/orders:0.4.7

  payment:
    image: weaveworksdemos/payment:0.4.3

  shipping:
    image: weaveworksdemos/shipping:0.4.8

  rabbitmq:
    image: rabbitmq:3-management

  queue-master:
    image: weaveworksdemos/queue-master:0.3.1
    depends_on:
      - rabbitmq

  # ---------------- LOCUST ----------------
  locust:
    build: ./locust
    ports:
      - "8089:8089"
    depends_on:
      - front-end
      - otel
      - log-stream
    environment:
      - LOG_STREAM_URL=http://log-stream:8080/v1/logs

  log-stream:
    build: ./log-stream
    ports:
      - "8090:8080"

  drain3:
    build: ./drain3
    depends_on:
      - log-stream
      - otel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # SLM: Ollama on host — run `ollama pull llama3.2` (or set SLM_MODEL to a tag you have).
    environment:
      - LOG_STREAM_URL=http://log-stream:8080/v1/stream
      - TEMPO_URL=http://otel:3200
      - SLM_URL=http://host.docker.internal:11434/api/generate
      - SLM_MODEL=llama3.2

  # ---------------- LGTM STACK ----------------
  otel:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "3100:3100"   # Loki
      - "3200:3200"   # Tempo query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin